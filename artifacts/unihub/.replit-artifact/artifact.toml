kind = "web"
previewPath = "/"
title = "UniHub"
version = "1.0.0"
id = "artifacts/unihub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22851

[services.development]
run = "pnpm --filter @workspace/unihub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unihub", "run", "build" ]
serve = "static"
publicDir = "artifacts/unihub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22851"
BASE_PATH = "/"
